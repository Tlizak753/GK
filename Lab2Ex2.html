<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body { background-color: #DDDDDD; user-select: none; }
    canvas { background-color: white; display: block; }
    #canvasholder { border:2px solid black; float: left; }
</style>
<script>
    "use strict";
    var canvas, graphics;
    function randomColorString() {
        var r = Math.floor(256*Math.random());
        var g = Math.floor(256*Math.random());
        var b = Math.floor(256*Math.random());
        return "rgb(" + r + "," + g + "," + b + ")";
    }
    function installMouseHandler() {
        var dragging = false;
        var prevX, prevY;
        function doMouseDown(evt) {
            if (dragging || evt.button != 0) return;
            var r = canvas.getBoundingClientRect();
            prevX = Math.round(evt.clientX - r.left);
            prevY = Math.round(evt.clientY - r.top);
            dragging = true;
            document.addEventListener("mousemove", doMouseMove, false);
            document.addEventListener("mouseup", doMouseUp, false);
        }
        function doMouseMove(evt) {
            if (!dragging) return;
            var r = canvas.getBoundingClientRect();
            var x = Math.round(evt.clientX - r.left);  
            var y = Math.round(evt.clientY - r.top);
            if (Math.abs(x-prevX) + Math.abs(y-prevY) < 30) return;
            var colorVal = document.getElementById("colorChoice").value;
            if (colorVal == "0") graphics.fillStyle = randomColorString();
            else if (colorVal == "1") graphics.fillStyle = "red";
            else if (colorVal == "2") graphics.fillStyle = "green";
            else if (colorVal == "3") graphics.fillStyle = "blue";
            else if (colorVal == "4") graphics.fillStyle = "pink";
            var tool = document.getElementById("toolChoice").value;
            if (tool == "0") {
                graphics.fillRect(x-20,y-20,40,40);
                graphics.strokeRect(x-20,y-20,40,40);
            } else {
                var pts = [];
                for(var i=0; i<14; i++) {
                    var angle = i * 2 * Math.PI / 14;
                    pts.push(x + 50 * Math.cos(angle));
                    pts.push(y + 50 * Math.sin(angle));
                }
                graphics.fillPoly.apply(graphics, pts);
                graphics.strokeStyle = "black";
                graphics.lineWidth = 2;
                graphics.strokePoly.apply(graphics, pts);
            }
            prevX = x; prevY = y;
        }
        function doMouseUp() {
            dragging = false;
            document.removeEventListener("mousemove", doMouseMove, false);
            document.removeEventListener("mouseup", doMouseUp, false);
        }
        canvas.addEventListener("mousedown", doMouseDown, false);
   }
    function addGraphicsContextExtras(graphics) {
        graphics.fillPoly = function() { 
            if (arguments.length < 6) return;
            this.beginPath();
            this.moveTo(arguments[0],arguments[1]);
            for (var i = 2; i+1 < arguments.length; i = i + 2) { 
               this.lineTo(arguments[i],arguments[i+1]);
            }
            this.closePath();
            this.fill();
        }
        graphics.strokePoly = function() { 
            if (arguments.length < 4) return;
            this.beginPath();
            this.moveTo(arguments[0],arguments[1]);
            for (var i = 2; i+1 < arguments.length; i = i + 2) { 
               this.lineTo(arguments[i],arguments[i+1]);
            }
            this.closePath();
            this.stroke();
        }
    }
    function init() {
        try {
            canvas = document.getElementById("canvas");
            graphics = canvas.getContext("2d");
        } catch(e) { return; }
        addGraphicsContextExtras(graphics);
        installMouseHandler();
        graphics.fillStyle = "white";
        graphics.fillRect(0,0,canvas.width,canvas.height);
        document.getElementById("clearButton").onclick = function() {
            graphics.fillStyle = "white";
            graphics.fillRect(0,0,canvas.width,canvas.height);
        };
    }
</script>
</head>
<body onload="init()">
<p>
    <b>Kolor:</b>
    <select id="colorChoice">
        <option value="0">Random</option>
        <option value="1">Red</option>
        <option value="2">Green</option>
        <option value="3">Blue</option>
        <option value="4">Pink</option>
    </select>
    <b>Narzędzie:</b>
    <select id="toolChoice">
        <option value="0">Kwadraty</option>
        <option value="1">14-stokąty</option>
    </select>
    <button id="clearButton">Wyczyść ekran</button>
</p>
<div id="canvasholder"><canvas id="canvas" width="800" height="600"></canvas></div>
</body>
</html>

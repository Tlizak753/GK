<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CPSC 424, Lab 2, Exercise 1</title>
<style>
    body {
        background-color: #DDDDDD;
    }
    canvas {
        background-color: white;
        display: block;
    }
    #canvasholder {
        border:2px solid black;
        float: left;
    }
</style>
<script>
    "use strict";

    var canvas;
    var graphics;
    var pixelSize;

    function draw() {
        graphics.clearRect(0,0,600,600);
        
        graphics.fillStyle = "yellow";
        graphics.fillPoly(300,120, 344,239, 471,244, 373,321, 406,444, 300,375, 194,444, 227,321, 129,244, 256,239);
        
        graphics.strokeStyle = "black";
        graphics.lineWidth = 2;
        graphics.strokePoly(300,120, 344,239, 471,244, 373,321, 406,444, 300,375, 194,444, 227,321, 129,244, 256,239);

        graphics.fillStyle = "white";
        graphics.fillCircle(260,260,16);
        graphics.fillCircle(340,260,16);
        
        graphics.fillStyle = "black";
        graphics.fillCircle(260,260,7);
        graphics.fillCircle(340,260,7);

        graphics.fillStyle = "black";
        graphics.beginPath();
        graphics.moveTo(260, 300);
        graphics.quadraticCurveTo(300, 320, 340, 300);
        graphics.quadraticCurveTo(300, 370, 260, 300);
        graphics.fill();

        graphics.fillStyle = "white";
        graphics.fillRect(291, 309, 8, 12);
        graphics.strokeRect(291, 309, 8, 12);
        graphics.fillRect(301, 309, 8, 12);
        graphics.strokeRect(301, 309, 8, 12);
    }
    
    function applyWindowToViewportTransformation(left,right,bottom,top,preserveAspect) {
        var displayAspect, windowAspect;
        var excess;
        var pixelwidth, pixelheight;
        if (preserveAspect) {
            displayAspect = Math.abs(canvas.height / canvas.width);
            windowAspect = Math.abs(( top-bottom ) / ( right-left ));
            if (displayAspect > windowAspect) {
                excess = (top-bottom) * (displayAspect/windowAspect - 1);
                top = top + excess/2;
                bottom = bottom - excess/2;
            }
            else if (displayAspect < windowAspect) {
                excess = (right-left) * (windowAspect/displayAspect - 1);
                right = right + excess/2;
                left = left - excess/2;
            }
        }
        graphics.scale( canvas.width / (right-left), canvas.height / (bottom-top) );
        graphics.translate( -left, -top );
        pixelwidth =  Math.abs(( right - left ) / canvas.width);
        pixelheight = Math.abs(( bottom - top ) / canvas.height);
        pixelSize = Math.max(pixelwidth,pixelheight);
    }

    function addGraphicsContextExtras(graphics) {
        graphics.strokeLine = function(x1,y1,x2,y2) {
           this.beginPath();
           this.moveTo(x1,y1);
           this.lineTo(x2,y2);
           this.stroke();
        }
        graphics.fillCircle = function(x,y,r) {
           this.beginPath();
           this.arc(x,y,r,0,2*Math.PI,false);
           this.fill();
        }
        graphics.strokeCircle = function(x,y,radius) {
           this.beginPath();
           this.arc(x,y,radius,0,2*Math.PI,false);
           this.stroke();
        }
        graphics.fillPoly = function() { 
            if (arguments.length < 6) return;
            this.beginPath();
            this.moveTo(arguments[0],arguments[1]);
            for (var i = 2; i+1 < arguments.length; i = i + 2) { 
               this.lineTo(arguments[i],arguments[i+1]);
            }
            this.closePath();
            this.fill();
        }
        graphics.strokePoly = function() { 
            if (arguments.length < 4) return;
            this.beginPath();
            this.moveTo(arguments[0],arguments[1]);
            for (var i = 2; i+1 < arguments.length; i = i + 2) { 
               this.lineTo(arguments[i],arguments[i+1]);
            }
            this.closePath();
            this.stroke();
        }
        graphics.fillOval = function(x,y,horizontalRadius,verticalRadius) {
           this.save();
           this.translate(x,y);
           this.scale(horizontalRadius,verticalRadius);
           this.beginPath();
           this.arc(0,0,1,0,2*Math.PI,false);
           this.restore();
           this.fill();
        }
        graphics.strokeOval = function(x,y,horizontalRadius,verticalRadius) {
           this.save();
           this.translate(x,y);
           this.scale(horizontalRadius,verticalRadius);
           this.beginPath();
           this.arc(0,0,1,0,2*Math.PI,false);
           this.restore();
           this.stroke();
        }
        graphics.getRGB = function(x,y) {
            var color = this.getImageData(x,y,1,1);
            return color.data;
        }
    }
    
    function init() {
        try {
            canvas = document.getElementById("canvas");
            graphics = canvas.getContext("2d");
        } catch(e) {
            document.getElementById("canvasholder").innerHTML = "Error";
            return;
        }
        addGraphicsContextExtras(graphics);
        draw();
    }
</script>
</head>
<body onload="init()">

<div id="canvasholder">
<canvas id="canvas" width="600" height="600"></canvas>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scene Graph 2D</title>

<script>
    var canvas;
    var graphics;

    var X_LEFT = -4;
    var X_RIGHT = 4;
    var Y_BOTTOM = -3;
    var Y_TOP = 3;
    var BACKGROUND = "white";
         
    var pixelSize;
    var frameNumber = 0;

    var world;
    var wielokatyDoAnimacji = [];

    function createWorld() {
        world = new CompoundObject();

        world.add(stworzHustawke(-2.2, 1.2, 0.6, "purple"));
        world.add(stworzHustawke(0.4, -1.2, 0.8, "blue"));
        world.add(stworzHustawke(2.5, 1.8, 0.4, "green"));
    }

    function stworzHustawke(x, y, skala, kolor) {
        var hustawka = new CompoundObject();
        
        var podstawa = new TransformedObject(filledTriangle);
        podstawa.setScale(0.8, 1.5).setColor(kolor);
        hustawka.add(podstawa);

        var gora = new CompoundObject();
        
        var belka = new TransformedObject(filledRect);
        belka.setScale(4, 0.2).setColor("red");
        gora.add(belka);

        var w1 = new TransformedObject(ksztaltWielokata);
        w1.setTranslation(-2, 0).setColor("black");
        wielokatyDoAnimacji.push(w1);
        gora.add(w1);

        var w2 = new TransformedObject(ksztaltWielokata);
        w2.setTranslation(2, 0).setColor("black");
        wielokatyDoAnimacji.push(w2);
        gora.add(w2);

        var ruchomaGora = new TransformedObject(gora);
        ruchomaGora.setTranslation(0, 1.5).setRotation(-15);
        hustawka.add(ruchomaGora);

        var calosc = new TransformedObject(hustawka);
        calosc.setTranslation(x, y).setScale(skala, skala);
        
        return calosc;
    }

    var ksztaltWielokata = new SceneGraphNode();
    ksztaltWielokata.doDraw = function(g) {
        var n = 12;
        g.beginPath();
        for (var i = 0; i <= n; i++) {
            var a = i * 2 * Math.PI / n;
            g.lineTo(0.5 * Math.cos(a), 0.5 * Math.sin(a));
        }
        g.stroke();
        for (var i = 0; i < n; i++) {
            var a = i * 2 * Math.PI / n;
            g.beginPath();
            g.moveTo(0, 0);
            g.lineTo(0.5 * Math.cos(a), 0.5 * Math.sin(a));
            g.stroke();
        }
    };

    function updateFrame() {
        frameNumber++;
        for (var i = 0; i < wielokatyDoAnimacji.length; i++) {
            wielokatyDoAnimacji[i].setRotation(frameNumber * 1.5);
        }
    }

    function SceneGraphNode() {
        this.fillColor = null;
        this.strokeColor = null;
    }
    SceneGraphNode.prototype.doDraw = function(g) {
        throw "doDraw not implemented"
    }
    SceneGraphNode.prototype.draw = function(g) {
        graphics.save();
        if (this.fillColor) { g.fillStyle = this.fillColor; }
        if (this.strokeColor) { g.strokeStyle = this.strokeColor; }
        this.doDraw(g);
        graphics.restore();
    }
    SceneGraphNode.prototype.setFillColor = function(color) {
        this.fillColor = color;
        return this;
    }
    SceneGraphNode.prototype.setStrokeColor = function(color) {
        this.strokeColor = color;
        return this;
    }
    SceneGraphNode.prototype.setColor = function(color) {
        this.fillColor = color;
        this.strokeColor = color;
        return this;
    }
    
    function CompoundObject() {
        SceneGraphNode.call(this);
        this.subobjects = [];
    }
    CompoundObject.prototype = new SceneGraphNode();
    CompoundObject.prototype.add = function(node) {
        this.subobjects.push(node);
        return this;
    }
    CompoundObject.prototype.doDraw = function(g) {
        for (var i = 0; i < this.subobjects.length; i++)
            this.subobjects[i].draw(g);
    }
    
    function TransformedObject(object) {
        SceneGraphNode.call(this);
        this.object = object;
        this.rotationInDegrees = 0;
        this.scaleX = 1;
        this.scaleY = 1;
        this.translateX = 0;
        this.translateY = 0;
    }
    TransformedObject.prototype = new SceneGraphNode();
    TransformedObject.prototype.setRotation = function(angle) {
        this.rotationInDegrees = angle;
        return this;
    }
    TransformedObject.prototype.setScale = function(sx, sy) {
        this.scaleX = sx;
        this.scaleY = sy;
        return this;
    }
    TransformedObject.prototype.setTranslation = function(dx,dy) {
        this.translateX = dx;
        this.translateY = dy;
        return this;
    }
    TransformedObject.prototype.doDraw = function(g) {
        g.save();
        if (this.translateX != 0 || this.translateY != 0) { g.translate(this.translateX, this.translateY); }
        if (this.rotationInDegrees != 0) { g.rotate(this.rotationInDegrees/180*Math.PI); }
        if (this.scaleX != 1 || this.scaleY != 1) { g.scale(this.scaleX, this.scaleY); }
        this.object.draw(g);
        g.restore();
    }
    
    var line = new SceneGraphNode();
    line.doDraw = function(g) {
        g.beginPath();
        g.moveTo(-0.5,0);
        g.lineTo(0.5,0);
        g.stroke();
    }
    
    var filledRect = new SceneGraphNode();
    filledRect.doDraw = function(g) {
        g.fillRect(-0.5,-0.5,1,1);
    }
    
    var rect = new SceneGraphNode();
    rect.doDraw = function(g) {
        g.strokeRect(-0.5,-0.5,1,1);
    }
    
    var filledCircle = new SceneGraphNode();
    filledCircle.doDraw = function(g) {
        g.beginPath();
        g.arc(0,0,0.5,0,2*Math.PI);
        g.fill();
    }
    
    var circle = new SceneGraphNode();
    circle.doDraw = function(g) {
        g.beginPath();
        g.arc(0,0,0.5,0,2*Math.PI);
        g.stroke();
    }
    
    var filledTriangle = new SceneGraphNode();
    filledTriangle.doDraw = function(g) {
        g.beginPath();
        g.moveTo(-0.5,0);
        g.lineTo(0.5,0);
        g.lineTo(0,1);
        g.closePath();
        g.fill();
    }   
    
    function draw() {
        graphics.save();
        graphics.fillStyle = BACKGROUND;
        graphics.fillRect(0,0,canvas.width,canvas.height);
        graphics.fillStyle = "black";
        applyLimits(graphics,X_LEFT,X_RIGHT,Y_TOP,Y_BOTTOM,false);
        graphics.lineWidth = pixelSize;
        world.draw(graphics);
        graphics.restore();
    }
    
    function applyLimits(g, xleft, xright, ytop, ybottom, preserveAspect) {
       var width = canvas.width;
       var height = canvas.height;
       if (preserveAspect) {
          var displayAspect = Math.abs(height / width);
          var requestedAspect = Math.abs(( ybottom-ytop ) / ( xright-xleft ));
          var excess;
          if (displayAspect > requestedAspect) {
             excess = (ybottom-ytop) * (displayAspect/requestedAspect - 1);
             ybottom += excess/2;
             ytop -= excess/2;
          }
          else if (displayAspect < requestedAspect) {
             excess = (xright-xleft) * (requestedAspect/displayAspect - 1);
             xright += excess/2;
             xleft -= excess/2;
          }
       }
       var pixelWidth = Math.abs(( xright - xleft ) / width);
       var pixelHeight = Math.abs(( ybottom - ytop ) / height);
       pixelSize = Math.min(pixelWidth,pixelHeight);
       g.scale( width / (xright-xleft), height / (ybottom-ytop) );
       g.translate( -xleft, -ytop );
    }
    
    var running = false;
    
    function frame() {
        if (running) {
            updateFrame();
            draw();
            requestAnimationFrame(frame);
        }
    }
    
    function doAnimationCheckbox() { 
        var shouldRun = document.getElementById("animateCheck").checked;
        if ( shouldRun != running ) {
            running = shouldRun;
            if (running)
                requestAnimationFrame(frame);
        }
    }
    
    function init() {
        canvas = document.getElementById("thecanvas");
        if (!canvas.getContext) {
            document.getElementById("message").innerHTML = "ERROR: Canvas not supported";
            return;
        }
        graphics = canvas.getContext("2d");
        document.getElementById("animateCheck").checked = false; 
        document.getElementById("animateCheck").onchange = doAnimationCheckbox; 
        createWorld();
        draw();
    }
</script>
</head>
<body onload="init()" style="background-color:#EEEEEE">
<h3>Scene Graph 2D</h3>
<p id="message"><label><input type="checkbox" id="animateCheck"><b>Run the Animation</b></label></p>
<div style="float:left; border: 2px solid black">
<canvas id="thecanvas" width="800" height="600" style="display:block"></canvas>
</div>
</body>
</html>
